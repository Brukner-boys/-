<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <rect width="400" height="260" rx="16" fill="#f7f8fa"/>
  <!-- גרדום -->
  <g stroke="#2b3648" stroke-width="7" stroke-linecap="round" fill="none">
    <line x1="300" y1="212" x2="372" y2="212"/>
    <line x1="336" y1="212" x2="336" y2="52"/>
    <line x1="336" y1="52" x2="392" y2="52"/>
    <line x1="392" y1="52" x2="392" y2="78"/>
  </g>
  <!-- ראש (אדום) -->
  <circle cx="392" cy="96" r="17" fill="none" stroke="#e03e3e" stroke-width="6"/>
  <line x1="392" y1="113" x2="392" y2="150" stroke="#e03e3e" stroke-width="6" stroke-linecap="round"/>
  <!-- תגית קטגוריה -->
  <rect x="150" y="30" width="120" height="30" rx="10" fill="#fdeecf"/>
  <text x="210" y="50" text-anchor="middle" font-size="17" font-family="Arial" font-weight="bold" fill="#b8860b">🚒 תחבורה</text>
  <!-- אותיות ומקפים -->
  <g font-size="30" font-family="Arial" font-weight="bold" fill="#2b3648" text-anchor="middle">
    <text x="112" y="112">א</text>
    <text x="150" y="112">י</text>
  </g>
  <g stroke="#2b3648" stroke-width="4" stroke-linecap="round">
    <line x1="96" y1="128" x2="128" y2="128"/>
    <line x1="136" y1="128" x2="168" y2="128"/>
    <line x1="176" y1="128" x2="208" y2="128"/>
    <line x1="216" y1="128" x2="248" y2="128"/>
  </g>
  <!-- לבבות -->
  <g font-size="20" text-anchor="middle">
    <text x="100" y="170">❤️</text>
    <text x="128" y="170">❤️</text>
    <text x="156" y="170">❤️</text>
    <text x="184" y="170" opacity="0.3">❤️</text>
    <text x="212" y="170" opacity="0.3">❤️</text>
  </g>
  <!-- אריחי אותיות -->
  <g>
    <rect x="96" y="196" width="40" height="40" rx="9" fill="#eef0f4" stroke="#d5d9e0" stroke-width="2"/>
    <text x="116" y="222" text-anchor="middle" font-size="22" font-family="Arial" font-weight="bold" fill="#5a6472">ב</text>
    <rect x="146" y="196" width="40" height="40" rx="9" fill="#fde2e2" stroke="#f2b8b8" stroke-width="2"/>
    <text x="166" y="222" text-anchor="middle" font-size="22" font-family="Arial" font-weight="bold" fill="#d05656">מ</text>
    <rect x="196" y="196" width="40" height="40" rx="9" fill="#d7f2dd" stroke="#a9e0b6" stroke-width="2"/>
    <text x="216" y="222" text-anchor="middle" font-size="22" font-family="Arial" font-weight="bold" fill="#3a9d55">א</text>
  </g>
</svg>
