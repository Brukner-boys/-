<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>אתר המשחקים של ברוקנר</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Heebo:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #234; --navy2: #2b4a6f;
      --orange: #ff8a3d; --orange-d: #f4711d;
      --sky: #46b1e8; --sky-d: #2b95cf;
      --green: #46c98a; --green-d: #2fae72;
      --cream: #fff7ec;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Varela Round", "Heebo", Arial, sans-serif;
      color: #22415f;
      background: linear-gradient(180deg, #e7f5fd 0%, #fff7ec 60%, #fdeede 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    /* עננים/עיגולים דקורטיביים ברקע */
    .blob { position: fixed; border-radius: 50%; filter: blur(2px); opacity: .5; z-index: 0; }
    .blob.b1 { width: 220px; height: 220px; background: #ffd9a8; top: -60px; inset-inline-start: -60px; }
    .blob.b2 { width: 160px; height: 160px; background: #b9e3fb; top: 120px; inset-inline-end: -40px; }
    .blob.b3 { width: 180px; height: 180px; background: #c8f2dc; bottom: -50px; inset-inline-start: 10%; }

    .wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 0 20px 70px; }

    /* כותרת - באנר חמים ומעוגל */
    header {
      margin: 34px auto 10px;
      background: linear-gradient(120deg, #ffb057, var(--orange) 55%, #ff6f61);
      border-radius: 30px;
      padding: 30px 26px;
      text-align: center;
      box-shadow: 0 14px 30px rgba(244, 113, 29, .3);
      position: relative;
      overflow: hidden;
    }
    header::before, header::after {
      content: ""; position: absolute; border-radius: 50%; background: rgba(255,255,255,.18);
    }
    header::before { width: 130px; height: 130px; top: -40px; inset-inline-end: -30px; }
    header::after { width: 90px; height: 90px; bottom: -35px; inset-inline-start: 40px; }
    header h1 {
      margin: 0; color: #fff; font-size: clamp(1.7rem, 5.2vw, 2.7rem);
      text-shadow: 0 3px 0 rgba(0,0,0,.12); position: relative;
    }
    header p {
      margin: 8px 0 0; color: #fff7ee; font-size: 1.05rem; position: relative;
      font-family: "Heebo", sans-serif; font-weight: 700;
    }

    /* רשת כרטיסיות */
    .game-list {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 28px; margin-top: 34px;
    }
    .game-card {
      display: flex; flex-direction: column; text-decoration: none; color: inherit;
      background: #fff; border-radius: 26px; overflow: hidden;
      box-shadow: 0 12px 26px rgba(34, 65, 95, .14);
      border: 4px solid #fff;
      transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s;
    }
    .game-card:hover { transform: translateY(-10px) rotate(-1deg); box-shadow: 0 22px 40px rgba(34,65,95,.22); }
    .thumb-wrap { position: relative; padding: 12px 12px 0; }
    .thumb {
      width: 100%; aspect-ratio: 400 / 260; object-fit: cover;
      display: block; border-radius: 18px; background: #eef4f9;
    }
    .game-name {
      padding: 16px 14px 20px; text-align: center; font-size: 1.35rem; font-weight: 700;
      color: #22415f;
    }
    .game-name .badge {
      display: inline-block; margin-inline-start: 6px; font-size: .72rem; font-weight: 800;
      color: #fff; padding: 3px 9px; border-radius: 20px; vertical-align: middle;
      font-family: "Heebo", sans-serif;
    }
    /* פס צבע עליון שונה לכל משחק */
    .accent-orange { border-top: 7px solid var(--orange); }
    .accent-sky { border-top: 7px solid var(--sky); }
    .accent-green { border-top: 7px solid var(--green); }
    .badge-orange { background: var(--orange-d); }
    .badge-sky { background: var(--sky-d); }

    footer {
      text-align: center; margin-top: 46px; color: #7b93ab;
      font-family: "Heebo", sans-serif; font-size: .95rem;
    }
    footer .heart { color: #ff6f61; }
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <div class="wrap">
    <header>
      <h1>🎮 אתר המשחקים של ברוקנר</h1>
      <p>בחרו משחק, לחצו — והתחילו לשחק! ✨</p>
    </header>

    <div class="game-list">
      <a class="game-card accent-orange" href="https://double-game.onrender.com" target="_blank" rel="noopener">
        <div class="thumb-wrap"><img class="thumb" src="thumbs/double.png" alt="דאבל" /></div>
        <div class="game-name">🎯 דאבל <span class="badge badge-orange">אונליין</span></div>
      </a>

      <a class="game-card accent-sky" href="ski-game.html">
        <div class="thumb-wrap"><img class="thumb" src="thumbs/ski.png" alt="כדור ביער" /></div>
        <div class="game-name">🎿 כדור ביער</div>
      </a>

      <a class="game-card accent-green" href="hangman.html">
        <div class="thumb-wrap"><img class="thumb" src="thumbs/hangman.png" alt="איש תלוי" /></div>
        <div class="game-name">🧍 איש תלוי</div>
      </a>
    </div>

    <footer>נבנה באהבה <span class="heart">❤</span> למשפחת ברוקנר</footer>
  </div>
</body>
</html>
