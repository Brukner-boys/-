<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangman — איש תלוי</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4ff;--card:#fff;--primary:#4f6ef7;--green:#22c55e;--red:#ef4444;
  --orange:#f97316;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;
  --radius:14px;--shadow:0 4px 20px rgba(0,0,0,.08);
}
body{
  font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#e0e7ff 0%,#f0fdf4 100%);
  min-height:100vh;color:var(--text);
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.screen{width:100%;max-width:700px;display:none}
.screen.active{display:block}

/* lang toggle */
.lang-bar{display:flex;justify-content:flex-end;margin-bottom:12px;gap:6px}
.lang-btn{
  background:var(--card);border:2px solid var(--border);border-radius:99px;
  padding:4px 14px;font-size:.8rem;font-weight:700;cursor:pointer;
  color:var(--muted);transition:all .15s;
}
.lang-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* LEVEL SELECT */
#screen-level{text-align:center}
.title-block{margin-bottom:28px}
.title-block h1{
  font-size:clamp(2rem,5vw,3rem);font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,var(--primary),#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.title-block .subtitle{font-size:1.05rem;color:var(--muted);margin-top:6px}
.levels-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:400px){.levels-grid{grid-template-columns:1fr}}
.level-btn{
  background:var(--card);border:2px solid transparent;border-radius:var(--radius);
  padding:20px 14px;cursor:pointer;transition:transform .15s,box-shadow .15s;
  box-shadow:var(--shadow);text-align:center;
}
.level-btn:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.14)}
.level-btn.l1{border-color:var(--green)}.level-btn.l2{border-color:#06b6d4}
.level-btn.l3{border-color:var(--orange)}.level-btn.l4{border-color:var(--red)}
.level-badge{font-size:1.8rem;margin-bottom:6px}
.level-name{font-size:1.05rem;font-weight:800;margin-bottom:2px}
.level-desc-a{font-size:.82rem;color:var(--muted);font-weight:600}
.level-desc-b{font-size:.78rem;color:var(--muted);margin-top:2px}

/* GAME SCREEN */
#screen-game{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:22px 18px;position:relative}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.level-tag{
  font-size:.78rem;font-weight:700;padding:4px 12px;border-radius:99px;
  text-transform:uppercase;letter-spacing:.5px;
}
.level-tag.l1{background:#dcfce7;color:#15803d}.level-tag.l2{background:#cffafe;color:#0e7490}
.level-tag.l3{background:#ffedd5;color:#c2410c}.level-tag.l4{background:#fee2e2;color:#b91c1c}
.new-game-btn{
  background:none;border:2px solid var(--border);border-radius:99px;
  padding:5px 14px;font-size:.8rem;font-weight:700;cursor:pointer;
  color:var(--muted);transition:all .15s;
}
.new-game-btn:hover{border-color:var(--primary);color:var(--primary)}
.game-body{display:flex;gap:20px;align-items:flex-start;margin-bottom:18px}
@media(max-width:500px){.game-body{flex-direction:column;align-items:center}}
.gallows-wrap{flex-shrink:0}
#gallows-svg{width:155px;height:195px}
.word-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px}

/* hint */
.hint-btn{
  background:none;border:2px dashed var(--border);border-radius:99px;
  padding:5px 14px;font-size:.82rem;font-weight:600;cursor:pointer;
  color:var(--muted);transition:all .15s;width:fit-content;
}
.hint-btn:hover{border-color:#eab308;color:#92400e}
.hint-text{
  display:none;font-size:.88rem;font-weight:700;color:#92400e;
  background:#fef3c7;border-radius:8px;padding:4px 12px;width:fit-content;
}
.hint-text.visible{display:block}

/* word display */
.word-display{display:flex;flex-wrap:wrap;gap:5px;align-items:flex-end}
.letter-slot{display:flex;flex-direction:column;align-items:center;gap:3px}
.revealed{font-size:1.5rem;font-weight:900;min-height:1.7rem;min-width:1.3rem;text-align:center;color:var(--text)}
.revealed.pop{animation:pop .3s ease}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.underline{width:100%;height:3px;background:var(--text);border-radius:2px;min-width:18px}
.lives-bar{display:flex;gap:4px;align-items:center}
.life{font-size:1rem;transition:opacity .3s}.life.lost{opacity:.15}
.wrong-section{font-size:.82rem}
.wrong-label{color:var(--muted);font-weight:600;margin-bottom:4px}
.wrong-letters{display:flex;flex-wrap:wrap;gap:4px}
.wrong-letter{
  background:#fee2e2;color:var(--red);font-weight:800;border-radius:6px;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  font-size:.85rem;
}

/* keyboard */
.keyboard{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.key-btn{
  width:34px;height:34px;border:2px solid var(--border);border-radius:8px;
  font-size:.88rem;font-weight:800;cursor:pointer;background:#f8fafc;
  color:var(--text);transition:all .12s;
}
.key-btn:hover:not(:disabled){background:var(--primary);color:#fff;border-color:var(--primary);transform:translateY(-2px)}
.key-btn:disabled{cursor:not-allowed;opacity:.4}
.key-btn.correct{background:#dcfce7;border-color:var(--green);color:#15803d}
.key-btn.wrong{background:#fee2e2;border-color:var(--red);color:var(--red)}

/* overlay */
.overlay{
  display:none;position:absolute;inset:0;border-radius:20px;
  background:rgba(255,255,255,.96);flex-direction:column;align-items:center;
  justify-content:center;gap:14px;text-align:center;padding:24px;z-index:10;
}
.overlay.show{display:flex}
.overlay-emoji{font-size:3.5rem}
.overlay-title{font-size:1.7rem;font-weight:900}
.overlay-title.win{color:var(--green)}.overlay-title.lose{color:var(--red)}
.overlay-word{font-size:2rem;font-weight:900;letter-spacing:3px;color:var(--primary)}
.overlay-sub{color:var(--muted);font-size:.9rem}
.overlay-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.btn-primary{
  background:var(--primary);color:#fff;border:none;border-radius:99px;
  padding:10px 24px;font-size:.95rem;font-weight:800;cursor:pointer;transition:opacity .15s,transform .15s;
}
.btn-primary:hover{opacity:.9;transform:translateY(-2px)}
.btn-secondary{
  background:#f1f5f9;color:var(--text);border:none;border-radius:99px;
  padding:10px 24px;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .15s;
}
.btn-secondary:hover{background:var(--border)}
</style>
</head>

// deduplicate each level for both banks
for(const bank of [WORDS, WORDS_HE]){
  for(const lvl of Object.keys(bank)){
    const seen=new Set();
    bank[lvl]=bank[lvl].filter(([w])=>{if(seen.has(w))return false;seen.add(w);return true;});
  }
}

// ─── GAME STATE ───────────────────────────────────────────
const state={level:1,word:"",wordEntry:null,guessed:new Set(),wrong:0,maxWrong:6,gameOver:false,won:false};

function getMaxWrong(len){ return len<=4?8:len<=6?7:6; }
function getPool(level){ return lang==="he"?WORDS_HE[level]:WORDS[level]; }

// ─── LANG ─────────────────────────────────────────────────
function setLang(l){
  lang=l;
  document.querySelectorAll(".lang-btn").forEach(b=>{
    b.classList.toggle("active",b.onclick.toString().includes(`'${l}'`));
  });
  applyTranslations();
  if(document.getElementById("screen-game").classList.contains("active")){
    goToLevelSelect();
  }
}

function applyTranslations(){
  const t=T[lang],isHe=lang==="he";
  document.documentElement.lang=isHe?"he":"en";
  document.documentElement.dir=isHe?"rtl":"ltr";
  document.getElementById("t-title").textContent=t.title;
  document.getElementById("t-subtitle").textContent=t.subtitle;
  for(let i=1;i<=4;i++){
    document.getElementById("t-l"+i+"name").textContent=t.lnames[i-1];
    document.getElementById("t-l"+i+"da").textContent=t.ldesca[i-1];
    document.getElementById("t-l"+i+"db").textContent=t.ldescb[i-1];
  }
  document.getElementById("t-hintbtn").textContent=t.hintbtn;
  document.getElementById("t-newgame").textContent=t.newgame;
  document.getElementById("ol-again").textContent=t.playAgain;
  document.getElementById("ol-level").textContent=t.changeLevel;
}

// ─── SCREENS ──────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goToLevelSelect(){
  document.removeEventListener("keydown",keyHandler);
  showScreen("screen-level");
}

// ─── START GAME ───────────────────────────────────────────
function startGame(level){
  const pool=getPool(level);
  const entry=pool[Math.floor(Math.random()*pool.length)];
  state.level=level;
  state.word=lang==="he"?entry[0]:entry[0].toUpperCase();
  state.wordEntry=entry;
  state.guessed=new Set();
  state.wrong=0;
  state.maxWrong=getMaxWrong(entry[0].length);
  state.gameOver=false;
  state.won=false;

  renderLevelTag();
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("hint-text").classList.remove("visible");
  document.getElementById("hint-btn").style.display="";
  applyTranslations();

  renderHangman();
  renderWord();
  renderLives();
  renderWrong();
  renderKeyboard();

  document.removeEventListener("keydown",keyHandler);
  document.addEventListener("keydown",keyHandler);
  showScreen("screen-game");
}

function renderLevelTag(){
  const tag=document.getElementById("level-tag");
  const icons=["","🌱","⭐","🔥","💎"];
  tag.textContent=T[lang].levelTags[state.level-1]+" "+icons[state.level];
  tag.className="level-tag l"+state.level;
}

// ─── HINT ────────────────────────────────────────────────
function showHint(){
  const [,emoji,hecat,encat]=state.wordEntry;
  const ht=document.getElementById("hint-text");
  ht.textContent=emoji+" "+(lang==="he"?hecat:encat);
  ht.classList.add("visible");
  document.getElementById("hint-btn").style.display="none";
}

// ─── KEYBOARD INPUT ───────────────────────────────────────
function keyHandler(e){
  if(state.gameOver)return;
  if(lang==="he"){
    const l=e.key;
    if(HE_LETTERS.includes(l)){handleGuess(l);return;}
    if(SOFIT_TO_BASE[l]){handleGuess(SOFIT_TO_BASE[l]);return;}
  }else{
    const l=e.key.toUpperCase();
    if(/^[A-Z]$/.test(l))handleGuess(l);
  }
}

// ─── HANDLE GUESS ─────────────────────────────────────────
function handleGuess(letter){
  if(state.gameOver||state.guessed.has(letter))return;
  state.guessed.add(letter);
  if(!wordContainsGuess(state.word,letter))state.wrong++;
  renderHangman();
  renderWord(letter);
  renderLives();
  renderWrong();
  updateKeyButton(letter);
  if(checkWin()){state.won=true;state.gameOver=true;setTimeout(showResult,400);}
  else if(state.wrong>=state.maxWrong){state.gameOver=true;setTimeout(showResult,400);}
}

// ─── RENDER ───────────────────────────────────────────────
function renderHangman(){
  for(let i=0;i<8;i++){
    const el=document.getElementById("hp"+i);
    if(!el)continue;
    el.style.opacity=(i<state.maxWrong&&state.wrong>i)?"1":"0";
  }
}

function renderWord(newLetter){
  const el=document.getElementById("word-display");
  el.innerHTML="";
  for(const ch of state.word){
    const slot=document.createElement("div");slot.className="letter-slot";
    const rev=document.createElement("div");rev.className="revealed";
    const revealed=lang==="he"?isLetterRevealed(ch,state.guessed):state.guessed.has(ch);
    if(revealed){
      rev.textContent=ch;
      const isNew=lang==="he"?(newLetter&&baseForm(ch)===newLetter):(ch===newLetter);
      if(isNew)rev.classList.add("pop");
    }
    const u=document.createElement("div");u.className="underline";
    slot.append(rev,u);el.appendChild(slot);
  }
}

function renderLives(){
  const bar=document.getElementById("lives-bar");bar.innerHTML="";
  for(let i=0;i<state.maxWrong;i++){
    const s=document.createElement("span");
    s.className="life"+(i<state.wrong?" lost":"");
    s.textContent="❤️";bar.appendChild(s);
  }
}

function renderWrong(){
  const wrongs=[...state.guessed].filter(l=>!wordContainsGuess(state.word,l));
  const t=T[lang];
  document.getElementById("wrong-label").textContent=
    wrongs.length?`${t.wronglabel} (${state.wrong}/${state.maxWrong}):` :"";
  const c=document.getElementById("wrong-letters");c.innerHTML="";
  wrongs.forEach(l=>{
    const s=document.createElement("span");s.className="wrong-letter";s.textContent=l;c.appendChild(s);
  });
}

function renderKeyboard(){
  const kb=document.getElementById("keyboard");kb.innerHTML="";
  const letters=lang==="he"?HE_LETTERS:Array.from({length:26},(_,i)=>String.fromCharCode(65+i));
  letters.forEach(l=>{
    const b=document.createElement("button");
    b.id="key-"+l;b.className="key-btn";b.textContent=l;
    b.onclick=()=>handleGuess(l);kb.appendChild(b);
  });
}

function updateKeyButton(letter){
  const b=document.getElementById("key-"+letter);
  if(!b)return;
  b.disabled=true;
  b.classList.add(wordContainsGuess(state.word,letter)?"correct":"wrong");
}

function checkWin(){
  return [...state.word].every(ch=>isLetterRevealed(ch,state.guessed));
}

// ─── RESULT OVERLAY ───────────────────────────────────────
function renderOverlayText(){
  if(!state.gameOver)return;
  const t=T[lang];
  document.getElementById("ol-emoji").textContent=state.won?"🎉":"😢";
  const titleEl=document.getElementById("ol-title");
  titleEl.textContent=state.won?t.winTitle:t.loseTitle;
  titleEl.className="overlay-title "+(state.won?"win":"lose");
  document.getElementById("ol-word").textContent=state.word;
  document.getElementById("ol-sub").textContent=t.wordWas;
  document.getElementById("ol-again").textContent=t.playAgain;
  document.getElementById("ol-level").textContent=t.changeLevel;
}

function showResult(){
  renderOverlayText();
  document.getElementById("overlay").classList.add("show");
}

// init
applyTranslations();
